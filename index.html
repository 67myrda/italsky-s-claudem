<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italsky s Claudem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7F0;
    --ink:#2B2520;
    --brick:#C44536;
    --brick-dark:#A8392C;
    --olive:#7A8B69;
    --olive-dark:#647355;
    --gold:#D4A24C;
    --paper:#FFFFFF;
    --line: rgba(43,37,32,0.12);
    --shadow: 0 1px 2px rgba(43,37,32,0.04), 0 8px 24px rgba(43,37,32,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(212,162,76,0.08), transparent 50%),
      radial-gradient(circle at 0% 100%, rgba(122,139,105,0.08), transparent 50%);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* TOP BAR */
  .topbar{
    background:linear-gradient(90deg, #5C6E4E 0%, #8FA07D 22%, #EDE6D6 50%, #D98F77 78%, #B8503D 100%);
    color:var(--ink);
    padding:13px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:50;
    box-shadow:0 2px 12px rgba(43,37,32,0.18);
  }
  .topbar-flag{display:none;}
  .topbar-title{
    display:flex;
    align-items:center;
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:17px;
    letter-spacing:-0.01em;
  }
  .topbar-title em{font-style:italic;color:var(--brick-dark);font-weight:600;}
  .menu-btn{
    background:rgba(43,37,32,0.12);
    border:none;
    color:var(--ink);
    width:38px;height:38px;
    border-radius:10px;
    font-size:17px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background 0.15s ease;
  }
  .menu-btn:hover{background:rgba(43,37,32,0.2);}

  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:20px 16px 48px;
  }

  /* TABLET PORTRAIT (Xiaomi Tab 6 a podobné) */
  @media (min-width:760px){
    .wrap{ max-width:760px; padding:32px 32px 70px; }
    .topbar{ padding:16px 28px; }
    .topbar-title{ font-size:19px; }
    h1{ font-size:38px; }
    .eyebrow{ font-size:13px; }

    .menu-nav{ gap:10px; padding:4px 2px 22px; }
    .day-pill{ width:68px; height:82px; border-radius:16px; }
    .day-pill .num{ font-size:18px; }
    .day-pill .emoji{ font-size:22px; }

    .card{ padding:36px 40px; border-radius:24px; }
    .lesson-title{ font-size:30px; }
    .card-label{ font-size:13px; }

    .line{ padding:18px 0; gap:16px; }
    .line-play{ width:42px; height:42px; font-size:16px; }
    .it{ font-size:21px; }
    .cz{ font-size:15.5px; }

    .sub-label{ font-size:13px; margin:28px 0 14px; }
    .vocab-grid{ grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .vocab-chip{ padding:12px 14px; }
    .vocab-chip .it{ font-size:16px; }
    .vocab-chip .cz{ font-size:13px; }

    .note{ padding:20px 22px; }
    .note-title{ font-size:15px; }
    .note-text{ font-size:15px; }
    .variation-text{ font-size:15px; }
    .variation-play{ width:34px; height:34px; font-size:13px; }
    .done-btn{ font-size:16.5px; padding:16px; max-width:360px; margin-left:auto; margin-right:auto; display:block; }
    .progress-footer{ font-size:13.5px; }
    .side-panel{ width:420px; }
  }

  /* HEADER */
  header{
    text-align:center;
    padding:18px 0 22px;
  }
  .eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--olive-dark);
    font-weight:600;
    margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:30px;
    margin:0;
    letter-spacing:-0.01em;
  }
  h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--brick);
  }

  /* WEEK MENU NAV */
  .menu-nav{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:4px 2px 16px;
    margin-bottom:8px;
    scrollbar-width:none;
  }
  .menu-nav::-webkit-scrollbar{display:none;}
  .day-pill{
    flex:0 0 auto;
    width:52px;
    height:64px;
    border-radius:14px;
    border:1.5px solid var(--line);
    background:var(--paper);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    cursor:pointer;
    transition:all 0.2s ease;
    position:relative;
  }
  .day-pill .num{
    font-family:'Fraunces',serif;
    font-size:15px;
    font-weight:600;
    color:var(--ink);
  }
  .day-pill .emoji{font-size:17px;}
  .day-pill.active{
    border-color:var(--brick);
    background:var(--brick);
    box-shadow:var(--shadow);
  }
  .day-pill.active .num{color:var(--cream);}
  .day-pill.done:not(.active)::after{
    content:'';
    position:absolute;
    top:6px; right:6px;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--olive);
  }
  .week-label{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10.5px;
    font-weight:700;
    color:#b0a797;
    letter-spacing:0.04em;
    padding:0 4px;
    align-self:center;
  }
  .week-label:not(:first-child){
    border-left:1.5px dashed var(--line);
    padding-left:10px;
    margin-left:2px;
  }

  /* CARD */
  .card{
    background:var(--paper);
    border-radius:20px;
    padding:24px 22px;
    box-shadow:var(--shadow);
    margin-bottom:16px;
  }
  .card-label{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--olive-dark);
    display:flex;
    align-items:center;
    gap:6px;
    margin-bottom:10px;
  }
  .lesson-title{
    font-family:'Fraunces',serif;
    font-size:24px;
    font-weight:600;
    margin:0 0 18px;
    display:flex;
    align-items:center;
    gap:10px;
  }

  /* DIALOGUE LINES */
  .line{
    padding:14px 0;
    border-top:1px solid var(--line);
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .line:first-of-type{border-top:none;}
  .line-play{
    flex:0 0 auto;
    width:34px;height:34px;
    border-radius:50%;
    border:none;
    background:var(--cream);
    color:var(--brick);
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.15s ease;
    margin-top:2px;
  }
  .line-play:hover{background:var(--brick);color:#fff;}
  .line-play.playing{
    background:var(--brick);
    color:#fff;
    animation:pulse 0.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(196,69,54,0.4);}
    50%{box-shadow:0 0 0 6px rgba(196,69,54,0);}
  }
  .line-text{flex:1;}
  .it{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:500;
    line-height:1.4;
  }
  .cz{
    font-size:14px;
    color:#6B6258;
    margin-top:2px;
  }

  /* SECTION HEADERS */
  .sub-label{
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--olive-dark);
    margin:22px 0 10px;
  }

  /* VOCAB CHIPS */
  .vocab-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .vocab-chip{
    background:var(--cream);
    border-radius:10px;
    padding:9px 12px;
  }
  .vocab-chip .it{font-size:14px;font-weight:600;}
  .vocab-chip .cz{font-size:12px;margin-top:1px;}

  /* NOTE BOXES */
  .note{
    border-radius:14px;
    padding:16px 16px;
    margin-top:10px;
  }
  .note.grammar{background:rgba(212,162,76,0.14);border:1px solid rgba(212,162,76,0.3);}
  .note.pronunciation{background:rgba(122,139,105,0.12);border:1px solid rgba(122,139,105,0.25);}
  .note-title{
    font-weight:700;
    font-size:13.5px;
    margin-bottom:4px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .note-text{font-size:13.5px;line-height:1.5;color:var(--ink);}

  /* VARIATIONS */
  .variations-box{margin-top:14px;}
  .variation-item{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:9px 0 9px 12px;
    border-left:3px solid var(--olive);
    margin-bottom:6px;
  }
  .variation-play{
    flex:0 0 auto;
    width:28px;height:28px;
    font-size:11px;
    margin-top:1px;
  }
  .variation-text{
    font-size:13.5px;
    line-height:1.5;
    color:var(--ink);
    flex:1;
  }
  .lei-badge{
    display:inline-block;
    background:rgba(212,162,76,0.25);
    color:var(--brick-dark);
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    border-radius:5px;
    padding:2px 6px;
    margin-right:7px;
    vertical-align:middle;
  }

  /* SHADOW TIP - compact pill */
  .shadow-tip-mini{
    margin-top:14px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(43,37,32,0.06);
    color:#6B6258;
    border-radius:20px;
    padding:6px 12px;
    font-size:11.5px;
    line-height:1.3;
  }

  /* DONE BUTTON */
  .done-btn{
    width:100%;
    margin-top:18px;
    padding:14px;
    border:none;
    border-radius:14px;
    background:var(--olive);
    color:#fff;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .done-btn.is-done{background:var(--cream);color:var(--olive-dark);border:1.5px solid var(--olive);}
  .done-btn:active{transform:scale(0.98);}

  /* REVIEW MODE */
  .review-intro-text{
    font-size:14px;
    line-height:1.55;
    color:#6B6258;
    margin-bottom:18px;
  }
  .review-stats{
    text-align:center;
    font-size:13px;
    color:var(--olive-dark);
    font-weight:600;
    margin-bottom:14px;
  }
  .big-review-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:var(--brick);
    color:#fff;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15.5px;
    cursor:pointer;
    transition:all 0.2s ease;
    margin-top:8px;
  }
  .big-review-btn:active{transform:scale(0.98);}
  .review-source-label{
    font-size:11px;
    color:#9a9082;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:600;
    margin-bottom:14px;
  }
  .review-prompt{
    font-size:22px;
    font-family:'Fraunces',serif;
    font-weight:500;
    line-height:1.4;
    margin-bottom:22px;
    color:var(--ink);
  }
  .reveal-btn{
    width:100%;
    padding:14px;
    border:1.5px dashed var(--olive);
    border-radius:14px;
    background:transparent;
    color:var(--olive-dark);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
  }
  .review-answer{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--cream);
    border-radius:14px;
    padding:16px;
    margin-bottom:4px;
  }
  .review-answer .it{font-size:20px;}
  .review-buttons{
    display:flex;
    gap:10px;
    margin-top:16px;
  }
  .review-btn{
    flex:1;
    padding:14px 8px;
    border:none;
    border-radius:14px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .review-btn.no{background:rgba(196,69,54,0.12);color:var(--brick-dark);}
  .review-btn.no:active{background:rgba(196,69,54,0.22);}
  .review-btn.yes{background:rgba(122,139,105,0.18);color:var(--olive-dark);}
  .review-btn.yes:active{background:rgba(122,139,105,0.3);}
  .review-complete{text-align:center;padding:36px 22px;}
  .review-result{font-size:15px;margin:10px 0 20px;color:#6B6258;}
  .review-result b{color:var(--brick);font-size:18px;}

  /* PROGRESS FOOTER */
  .progress-footer{
    text-align:center;
    font-size:12px;
    color:#8a8076;
    margin-top:8px;
  }
  .progress-footer b{color:var(--ink);}

  /* SUMMARY VIEW */
  .summary-block{margin-bottom:18px;}
  .summary-day-label{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:15px;
    color:var(--brick);
    margin-bottom:6px;
  }

  /* APP FOOTER */
  .app-footer{
    text-align:center;
    font-size:11.5px;
    color:#a39a8d;
    padding:28px 16px 20px;
  }

  /* SIDE PANEL */
  .overlay{
    position:fixed; inset:0;
    background:rgba(43,37,32,0.45);
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
    z-index:90;
  }
  .overlay.open{opacity:1;pointer-events:auto;}
  .side-panel{
    position:fixed;
    top:0; right:0;
    height:100%;
    width:88vw;
    max-width:400px;
    background:var(--cream);
    z-index:100;
    transform:translateX(100%);
    transition:transform 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow:-8px 0 30px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
  }
  .side-panel.open{transform:translateX(0);}
  .panel-header{
    background:var(--ink);
    color:var(--cream);
    padding:16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex:0 0 auto;
  }
  .panel-header-title{font-family:'Fraunces',serif;font-weight:600;font-size:17px;}
  .panel-close{
    background:rgba(255,255,255,0.1);
    border:none;color:var(--cream);
    width:32px;height:32px;border-radius:8px;
    font-size:16px;cursor:pointer;
  }
  .panel-tabs{
    display:flex;
    flex:0 0 auto;
    border-bottom:1px solid var(--line);
    background:var(--paper);
    overflow-x:auto;
  }
  .panel-tab{
    flex:0 0 auto;
    padding:12px 13px;
    text-align:center;
    font-size:11.5px;
    font-weight:600;
    color:#9a9082;
    cursor:pointer;
    border-bottom:2.5px solid transparent;
    white-space:nowrap;
  }
  .panel-tab.active{color:var(--brick);border-bottom-color:var(--brick);}
  .panel-body{
    flex:1;
    overflow-y:auto;
    padding:16px;
  }
  .panel-search{
    width:100%;
    padding:11px 14px;
    border-radius:12px;
    border:1.5px solid var(--line);
    font-size:14px;
    font-family:'Inter',sans-serif;
    margin-bottom:14px;
    background:var(--paper);
    color:var(--ink);
  }
  .panel-search:focus{outline:none;border-color:var(--brick);}
  .panel-section-title{
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--olive-dark);
    margin:16px 0 8px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .panel-section-title:first-child{margin-top:0;}
  .panel-vocab-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    font-size:13.5px;
    gap:10px;
  }
  .panel-vocab-row .it{font-family:'Fraunces',serif;font-weight:500;}
  .panel-vocab-row .cz{color:#6B6258;text-align:right;flex:0 0 auto;}
  .panel-phrase-row{
    background:var(--paper);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:7px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .panel-phrase-row .it{font-family:'Fraunces',serif;font-size:14px;font-weight:500;}
  .panel-phrase-row .cz{font-size:12px;color:#6B6258;margin-top:2px;}
  .panel-phrase-play{
    flex:0 0 auto;
    width:28px;height:28px;border-radius:50%;
    border:none;background:var(--cream);color:var(--brick);
    font-size:11px;cursor:pointer;
  }
  .panel-note{
    background:var(--paper);
    border-radius:10px;
    padding:11px 13px;
    margin-bottom:7px;
    font-size:13px;
    line-height:1.5;
  }
  .panel-empty{
    text-align:center;
    color:#a39a8d;
    font-size:13px;
    padding:30px 10px;
  }

  /* VERB CARDS */
  .verb-card{
    background:var(--paper);
    border-radius:14px;
    padding:14px 15px;
    margin-bottom:14px;
    border:1px solid var(--line);
  }
  .verb-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .verb-title .it{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:17px;
    margin-right:8px;
  }
  .verb-title .cz{
    font-size:12.5px;
    color:#6B6258;
  }
  .verb-table{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px 14px;
    margin-bottom:10px;
  }
  .verb-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:4px 0;
    border-bottom:1px solid var(--line);
  }
  .verb-row .person{color:#9a9082;}
  .verb-row .form{font-weight:600;font-family:'Fraunces',serif;}
  .verb-example{
    background:var(--cream);
    border-radius:10px;
    padding:9px 11px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .verb-example .it{
    font-family:'Fraunces',serif;
    font-size:13.5px;
    font-weight:500;
    display:block;
  }
  .verb-example .cz{
    font-size:11.5px;
    color:#6B6258;
    display:block;
    margin-top:1px;
  }

  @media (max-width:380px){
    h1{font-size:26px;}
    .it{font-size:16.5px;}
    .topbar-title{font-size:15px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <span class="topbar-flag"><span style="background:#7A8B69"></span><span style="background:#FBF7F0"></span><span style="background:#C44536"></span></span>
    Italsky&nbsp;<em>s Claudem</em>
  </div>
  <button class="menu-btn" id="openPanelBtn" aria-label="Otevřít menu">☰</button>
</div>

<div class="wrap">

  <header>
    <div class="eyebrow">Lezione del giorno</div>
    <h1>Menu <em>del Giorno</em></h1>
  </header>

  <nav class="menu-nav" id="menuNav"></nav>

  <div id="lessonContainer"></div>

  <div class="progress-footer" id="progressFooter"></div>

</div>

<div class="app-footer">🇮🇹 © ⁶⁷〽️ with Claude🔆 2026</div>

<!-- SIDE PANEL -->
<div class="overlay" id="overlay"></div>
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div class="panel-header-title">📚 Studijní materiály</div>
    <button class="panel-close" id="closePanelBtn">✕</button>
  </div>
  <div class="panel-tabs" id="panelTabs">
    <div class="panel-tab active" data-tab="vocab">🧺 Slovník</div>
    <div class="panel-tab" data-tab="grammar">📐 Gramatika</div>
    <div class="panel-tab" data-tab="verbs">🔁 Slovesa</div>
    <div class="panel-tab" data-tab="pronunciation">🔊 Výslovnost</div>
    <div class="panel-tab" data-tab="phrasebook">🆘 Fráze</div>
    <div class="panel-tab" data-tab="customs">🇮🇹 Zvyklosti</div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
let LESSONS = [];
let PHRASEBOOK = null;
let CUSTOMS = null;
let VERBS = null;
let currentDay = 1;
let activeTab = 'vocab';
let progress = JSON.parse(localStorage.getItem('it_progress') || '{}');

const EMOJI_THEME = { gastro:'🍝', cestovani:'🧳', obecna:'💬', shrnuti:'📝' };

async function loadLessons(){
  const res = await fetch('lessons.json');
  const data = await res.json();
  LESSONS = data.lessons;
  PHRASEBOOK = data.phrasebook || null;
  CUSTOMS = data.customs || null;
  VERBS = data.verbs || null;
  const lastOpened = localStorage.getItem('it_last_day');
  currentDay = lastOpened ? parseInt(lastOpened) : 1;
  renderNav();
  renderLesson(currentDay);
}

function renderNav(){
  const nav = document.getElementById('menuNav');
  nav.innerHTML = '';
  let lastWeek = 0;
  const showWeeks = LESSONS.length > 7;
  LESSONS.forEach(l => {
    const week = Math.ceil(l.day / 7);
    if (showWeeks && week !== lastWeek){
      const label = document.createElement('div');
      label.className = 'week-label';
      label.textContent = `T${week}`;
      nav.appendChild(label);
      lastWeek = week;
    }
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (l.day === currentDay ? ' active' : '') + (progress[l.day] ? ' done' : '');
    pill.innerHTML = `<div class="emoji">${l.emoji}</div><div class="num">${l.day}</div>`;
    pill.onclick = () => { currentDay = l.day; localStorage.setItem('it_last_day', currentDay); renderNav(); renderLesson(currentDay); };
    nav.appendChild(pill);
  });
}

function speak(text, btn){
  if (!('speechSynthesis' in window)) { alert('Tvůj prohlížeč nepodporuje hlasový výstup.'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'it-IT';
  utter.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const itVoice = voices.find(v => v.lang.startsWith('it'));
  if (itVoice) utter.voice = itVoice;

  document.querySelectorAll('.line-play.playing, .panel-phrase-play.playing').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  utter.onend = () => { if (btn) btn.classList.remove('playing'); };
  window.speechSynthesis.speak(utter);
}

function renderLesson(day){
  const lesson = LESSONS.find(l => l.day === day);
  const container = document.getElementById('lessonContainer');
  if (!lesson) { container.innerHTML = ''; return; }

  if (lesson.isSummary){
    renderSummary(lesson, container);
    return;
  }

  if (lesson.type === 'review'){
    renderReviewIntro(lesson, container);
    return;
  }

  const themeLabel = { gastro:'Gastro & jídlo', cestovani:'Cestování', obecna:'Obecná konverzace' }[lesson.theme] || '';

  let html = `<div class="card">
    <div class="card-label">${EMOJI_THEME[lesson.theme]} ${themeLabel} · Den ${lesson.day}</div>
    <div class="lesson-title">${lesson.emoji} ${lesson.title}</div>`;

  lesson.dialogue.forEach((line) => {
    html += `<div class="line">
      <button class="line-play" data-text="${escapeAttr(line.it)}" onclick="speak(this.dataset.text, this)">▶</button>
      <div class="line-text">
        <div class="it">${line.it}</div>
        <div class="cz">${line.cz}</div>
      </div>
    </div>`;
  });

  html += `<div class="sub-label">🧺 Slovní zásoba</div><div class="vocab-grid">`;
  lesson.vocab.forEach(v => {
    html += `<div class="vocab-chip"><div class="it">${v.it}</div><div class="cz">${v.cz}</div></div>`;
  });
  html += `</div>`;

  html += `<div class="note grammar">
      <div class="note-title">📐 ${lesson.grammar.title}</div>
      <div class="note-text">${lesson.grammar.text}</div>
    </div>`;

  html += `<div class="note pronunciation">
      <div class="note-title">🔊 ${lesson.pronunciation.title}</div>
      <div class="note-text">${lesson.pronunciation.text}</div>
    </div>`;

  const variationsList = lesson.variations || (lesson.variation ? [lesson.variation] : []);
  if (variationsList.length){
    html += `<div class="sub-label">💡 Variace</div><div class="variations-box">`;
    variationsList.forEach(v => {
      let display = v;
      let leiTag = '';
      if (v.startsWith('⚜LEI⚜')){
        leiTag = `<span class="lei-badge">Lei · zdvořile</span>`;
        display = v.replace('⚜LEI⚜','');
      }
      const itPart = display.split(/\s*\(/)[0].trim();
      html += `<div class="variation-item">
        <button class="line-play variation-play" data-text="${escapeAttr(itPart)}" onclick="speak(this.dataset.text, this)">▶</button>
        <div class="variation-text">${leiTag}${display}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="shadow-tip-mini">🎯 Shadowing: poslechni ▶ a opakuj současně</div>`;

  html += `</div>`;

  html += `<button class="done-btn ${progress[day] ? 'is-done' : ''}" id="doneBtn">${progress[day] ? '✓ Hotovo dnes' : 'Označit jako hotovo'}</button>`;

  container.innerHTML = html;

  document.getElementById('doneBtn').onclick = () => {
    progress[day] = !progress[day];
    localStorage.setItem('it_progress', JSON.stringify(progress));
    renderNav();
    renderLesson(day);
  };

  updateProgressFooter();
}

function renderSummary(lesson, container){
  const days = lesson.summaryOf.map(d => LESSONS.find(l => l.day === d)).filter(Boolean);
  let html = `<div class="card">
    <div class="card-label">📝 Shrnutí cyklu</div>
    <div class="lesson-title">${lesson.emoji} ${lesson.title}</div>
    <div class="sub-label" style="margin-top:0;">Gramatika tohoto cyklu</div>`;

  days.forEach(d => {
    html += `<div class="summary-block">
      <div class="summary-day-label">Den ${d.day} — ${d.title}</div>
      <div class="note grammar" style="margin-top:0;">
        <div class="note-title">📐 ${d.grammar.title}</div>
        <div class="note-text">${d.grammar.text}</div>
      </div>
    </div>`;
  });

  html += `<div class="sub-label">🔊 Výslovnostní pravidla</div>`;
  days.forEach(d => {
    html += `<div class="note pronunciation" style="margin-bottom:8px;">
      <div class="note-title">${d.pronunciation.title}</div>
      <div class="note-text">${d.pronunciation.text}</div>
    </div>`;
  });

  if (lesson.reviewAll){
    html += `<button class="big-review-btn" id="bigReviewBtn">🔁 Spustit velké opakování</button>`;
  }
  html += `</div>`;

  html += `<button class="done-btn ${progress[lesson.day] ? 'is-done' : ''}" id="doneBtn">${progress[lesson.day] ? '✓ Hotovo' : 'Označit shrnutí jako hotové'}</button>`;

  container.innerHTML = html;
  document.getElementById('doneBtn').onclick = () => {
    progress[lesson.day] = !progress[lesson.day];
    localStorage.setItem('it_progress', JSON.stringify(progress));
    renderNav();
    renderLesson(lesson.day);
  };
  if (lesson.reviewAll){
    document.getElementById('bigReviewBtn').onclick = () => startBigReview(lesson.day);
  }
  updateProgressFooter();
}

function updateProgressFooter(){
  const total = LESSONS.length;
  const done = Object.values(progress).filter(Boolean).length;
  document.getElementById('progressFooter').innerHTML = `<b>${done}/${total}</b> lekcí hotovo celkem`;
}

/* ===== SPACED REPETITION REVIEW ENGINE ===== */
const SRS_LADDER = [1, 3, 7, 14, 30]; // dny do dalšího opakování po úspěšném vybavení
let reviewSession = null;

function buildPool(uptoDay){
  let pool = [];
  LESSONS.forEach(l => {
    if (l.type === 'new' && l.day <= uptoDay){
      l.vocab.forEach((v, i) => {
        pool.push({ key:`vocab:${l.day}:${i}`, it:v.it, cz:v.cz, source:`${l.emoji} Den ${l.day} — ${l.title}` });
      });
    }
  });
  if (PHRASEBOOK){
    PHRASEBOOK.categories.forEach((cat, ci) => {
      cat.phrases.forEach((p, pi) => {
        pool.push({ key:`phrase:${ci}:${pi}`, it:p.it, cz:p.cz, source:`${cat.emoji} ${cat.category}` });
      });
    });
  }
  return pool;
}

function getSrsState(){
  return JSON.parse(localStorage.getItem('it_srs') || '{}');
}

function getDueItems(pool, limit){
  const srs = getSrsState();
  const now = Date.now();
  const scored = pool.map(item => {
    const state = srs[item.key];
    if (!state) return { ...item, box:0, overdue: now };
    const due = new Date(state.due).getTime();
    return { ...item, box: state.box, overdue: now - due };
  });
  let due = scored.filter(s => s.overdue >= 0).sort((a,b) => b.overdue - a.overdue);
  if (due.length < limit){
    const dueKeys = new Set(due.map(d => d.key));
    const rest = scored.filter(s => !dueKeys.has(s.key)).sort((a,b) => a.box - b.box);
    due = due.concat(rest.slice(0, limit - due.length));
  }
  return shuffleArray(due.slice(0, limit));
}

function shuffleArray(arr){
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateSRS(key, remembered){
  const srs = getSrsState();
  let state = srs[key] || { box: 0 };
  state.box = remembered ? Math.min(state.box + 1, SRS_LADDER.length - 1) : 0;
  const days = SRS_LADDER[state.box];
  state.due = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toISOString();
  srs[key] = state;
  localStorage.setItem('it_srs', JSON.stringify(srs));
}

function renderReviewIntro(lesson, container){
  const pool = buildPool(lesson.day - 1);
  const due = getDueItems(pool, 14);
  let html = `<div class="card review-intro">
    <div class="card-label">🔁 Opakování · Den ${lesson.day}</div>
    <div class="lesson-title">🔁 Co si ještě pamatuješ?</div>
    <div class="review-intro-text">Žádný nový obsah dnes — jen aktivní vybavování toho, co už jsi probral/a. Appka ti ukáže český překlad, zkus si vzpomenout na italskou větu, než ji odkryješ.</div>`;
  if (due.length === 0){
    html += `<div class="panel-empty">Zatím nemáš nic k opakování — projdi si nejdřív nějakou novou lekci.</div></div>`;
    container.innerHTML = html;
    return;
  }
  html += `<div class="review-stats">${due.length} položek připraveno</div>
    <button class="big-review-btn" id="startReviewBtn">▶ Spustit opakování</button>
  </div>`;
  container.innerHTML = html;
  document.getElementById('startReviewBtn').onclick = () => startReviewSession(due);
}

function startBigReview(uptoDay){
  const pool = buildPool(uptoDay - 1);
  const due = getDueItems(pool, 20);
  if (due.length === 0){ alert('Není zatím nic k opakování.'); return; }
  startReviewSession(due);
}

function startReviewSession(items){
  reviewSession = { items, index:0, correct:0, total: items.length };
  renderReviewCard();
}

function renderReviewCard(){
  const container = document.getElementById('lessonContainer');
  if (!reviewSession || reviewSession.index >= reviewSession.items.length){
    return renderReviewComplete(container);
  }
  const item = reviewSession.items[reviewSession.index];
  let html = `<div class="card review-card">
    <div class="card-label">🔁 Opakování · ${reviewSession.index + 1}/${reviewSession.total}</div>
    <div class="review-source-label">${item.source}</div>
    <div class="review-prompt">${item.cz}</div>
    <button class="reveal-btn" id="revealBtn">Ukázat</button>
    <div class="review-answer" id="reviewAnswer" style="display:none;">
      <button class="line-play" data-text="${escapeAttr(item.it)}" onclick="speak(this.dataset.text, this)">▶</button>
      <div class="it">${item.it}</div>
    </div>
    <div class="review-buttons" id="reviewButtons" style="display:none;">
      <button class="review-btn no" onclick="answerReview(false)">❌ Nevzpomněl/a jsem si</button>
      <button class="review-btn yes" onclick="answerReview(true)">✅ Vzpomněl/a jsem si</button>
    </div>
  </div>`;
  container.innerHTML = html;
  document.getElementById('revealBtn').onclick = () => {
    document.getElementById('reviewAnswer').style.display = 'flex';
    document.getElementById('reviewButtons').style.display = 'flex';
    document.getElementById('revealBtn').style.display = 'none';
  };
}

function answerReview(remembered){
  const item = reviewSession.items[reviewSession.index];
  updateSRS(item.key, remembered);
  if (remembered) reviewSession.correct++;
  reviewSession.index++;
  renderReviewCard();
}

function renderReviewComplete(container){
  const { correct, total } = reviewSession;
  container.innerHTML = `<div class="card review-complete">
    <div class="lesson-title">🎉 Hotovo!</div>
    <div class="review-result">Vzpomněl/a jsi si na <b>${correct}/${total}</b> položek.</div>
    <button class="done-btn" id="reviewDoneBtn">Označit den jako hotový</button>
  </div>`;
  document.getElementById('reviewDoneBtn').onclick = () => {
    progress[currentDay] = true;
    localStorage.setItem('it_progress', JSON.stringify(progress));
    renderNav();
    updateProgressFooter();
  };
}

function escapeAttr(s){
  return s.replace(/"/g,'&quot;');
}

/* ===== SIDE PANEL ===== */
const overlay = document.getElementById('overlay');
const sidePanel = document.getElementById('sidePanel');

document.getElementById('openPanelBtn').onclick = () => openPanel();
document.getElementById('closePanelBtn').onclick = () => closePanel();
overlay.onclick = () => closePanel();

function openPanel(){
  overlay.classList.add('open');
  sidePanel.classList.add('open');
  renderPanel();
}
function closePanel(){
  overlay.classList.remove('open');
  sidePanel.classList.remove('open');
}

document.getElementById('panelTabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.panel-tab');
  if (!tab) return;
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeTab = tab.dataset.tab;
  renderPanel();
});

function renderPanel(){
  const body = document.getElementById('panelBody');
  if (activeTab === 'vocab') return renderPanelVocab(body);
  if (activeTab === 'grammar') return renderPanelGrammar(body);
  if (activeTab === 'verbs') return renderPanelVerbs(body);
  if (activeTab === 'pronunciation') return renderPanelPronunciation(body);
  if (activeTab === 'phrasebook') return renderPanelPhrasebook(body);
  if (activeTab === 'customs') return renderPanelCustoms(body);
}

function renderPanelVocab(body){
  body.innerHTML = `<input type="text" class="panel-search" id="vocabSearch" placeholder="Hledat slovo (italsky nebo česky)...">
    <div id="vocabList"></div>`;
  const list = document.getElementById('vocabList');

  function draw(filter){
    let html = '';
    const f = (filter || '').toLowerCase();
    LESSONS.filter(l => !l.isSummary).forEach(lesson => {
      const matches = lesson.vocab.filter(v =>
        !f || v.it.toLowerCase().includes(f) || v.cz.toLowerCase().includes(f)
      );
      if (!matches.length) return;
      html += `<div class="panel-section-title">${lesson.emoji} Den ${lesson.day} — ${lesson.title}</div>`;
      matches.forEach(v => {
        html += `<div class="panel-vocab-row"><span class="it">${v.it}</span><span class="cz">${v.cz}</span></div>`;
      });
    });
    list.innerHTML = html || `<div class="panel-empty">Nic nenalezeno.</div>`;
  }
  draw('');
  document.getElementById('vocabSearch').addEventListener('input', (e) => draw(e.target.value));
}

function renderPanelGrammar(body){
  let html = '';
  LESSONS.filter(l => !l.isSummary).forEach(lesson => {
    html += `<div class="panel-section-title">${lesson.emoji} Den ${lesson.day} — ${lesson.title}</div>
      <div class="panel-note"><b>${lesson.grammar.title}</b><br>${lesson.grammar.text}</div>`;
  });
  body.innerHTML = html;
}

function renderPanelPronunciation(body){
  let html = '';
  LESSONS.filter(l => !l.isSummary).forEach(lesson => {
    html += `<div class="panel-section-title">${lesson.emoji} Den ${lesson.day} — ${lesson.title}</div>
      <div class="panel-note"><b>${lesson.pronunciation.title}</b><br>${lesson.pronunciation.text}</div>`;
  });
  body.innerHTML = html;
}

function renderPanelPhrasebook(body){
  if (!PHRASEBOOK){ body.innerHTML = `<div class="panel-empty">Zatím nic k zobrazení.</div>`; return; }
  let html = `<div style="font-size:12.5px;color:#6B6258;margin-bottom:14px;">${PHRASEBOOK.subtitle || ''}</div>`;
  PHRASEBOOK.categories.forEach(cat => {
    html += `<div class="panel-section-title">${cat.emoji} ${cat.category}</div>`;
    cat.phrases.forEach(p => {
      html += `<div class="panel-phrase-row">
        <div><div class="it">${p.it}</div><div class="cz">${p.cz}</div></div>
        <button class="panel-phrase-play" data-text="${escapeAttr(p.it)}" onclick="speak(this.dataset.text, this)">▶</button>
      </div>`;
    });
  });
  body.innerHTML = html;
}

function renderPanelCustoms(body){
  if (!CUSTOMS){ body.innerHTML = `<div class="panel-empty">Zatím nic k zobrazení.</div>`; return; }
  let html = `<div style="font-size:12.5px;color:#6B6258;margin-bottom:14px;">${CUSTOMS.subtitle || ''}</div>`;
  CUSTOMS.categories.forEach(cat => {
    html += `<div class="panel-section-title">${cat.emoji} ${cat.category}</div>`;
    cat.notes.forEach(n => {
      html += `<div class="panel-note">${n}</div>`;
    });
  });
  body.innerHTML = html;
}

function renderPanelVerbs(body){
  if (!VERBS){ body.innerHTML = `<div class="panel-empty">Zatím nic k zobrazení.</div>`; return; }
  let html = `<div style="font-size:12.5px;color:#6B6258;margin-bottom:14px;">${VERBS.subtitle || ''}</div>`;
  VERBS.list.forEach(v => {
    const formsLine = v.forms.join(', ');
    html += `<div class="verb-card">
      <div class="verb-head">
        <div class="verb-title"><span class="it">${v.infinitive}</span><span class="cz">${v.meaning}</span></div>
        <button class="panel-phrase-play" title="Poslechni celé časování" data-text="${escapeAttr(formsLine)}" onclick="speak(this.dataset.text, this)">▶</button>
      </div>
      <div class="verb-table">
        ${VERBS.persons.map((p,i) => `<div class="verb-row"><span class="person">${p}</span><span class="form">${v.forms[i]}</span></div>`).join('')}
      </div>
      <div class="verb-example">
        <div><span class="it">${v.example.it}</span><span class="cz">${v.example.cz}</span></div>
        <button class="panel-phrase-play" data-text="${escapeAttr(v.example.it)}" onclick="speak(this.dataset.text, this)">▶</button>
      </div>
    </div>`;
  });
  body.innerHTML = html;
}

if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

loadLessons();
</script>

</body>
</html>
